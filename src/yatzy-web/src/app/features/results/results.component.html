<div class="results-container">
  <div class="trophy-wrap">
    <span class="trophy" *ngIf="isWinner">🏆</span>
    <span class="trophy" *ngIf="!isWinner">🎲</span>
  </div>

  <h1 class="headline" [class.is-winner]="isWinner">
    {{ isWinner ? 'Du vandt!' : 'Spillet er slut!' }}
  </h1>
  <p class="winner-name" *ngIf="!isWinner && winner">
    {{ winner.displayName }} vinder med {{ winner.totalScore }} point
  </p>

  <div class="standings">
    <div *ngFor="let player of standings; let i = index"
         class="standing-row"
         [class.rank-1]="i === 0"
         [class.rank-2]="i === 1"
         [class.rank-3]="i === 2"
         [class.me]="player.playerId === myPlayerId">
      <span class="medal">{{ i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) }}</span>
      <span class="name">{{ player.displayName }}<span class="you-tag" *ngIf="player.playerId === myPlayerId"> dig</span></span>
      <span class="score">{{ player.totalScore }} point</span>
    </div>
  </div>

  <p class="error-msg" *ngIf="errorMessage">⚠️ {{ errorMessage }}</p>

  <div class="action-row">
    <button class="btn-new-game" (click)="newGame()" [disabled]="isCreating">
      {{ isCreating ? 'Opretter...' : '🎲 Nyt spil' }}
    </button>
    <button class="btn-home" (click)="goHome()">🏠 Forside</button>
  </div>
</div>
