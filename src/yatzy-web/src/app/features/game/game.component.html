<div class="game-layout" *ngIf="game; else noGame">

  <!-- LEFT: Spillere + kamera -->
  <aside class="col-players">
    <div class="room-badge">
      <span class="room-label">Rum</span>
      <span class="room-code">{{ game.roomCode }}</span>
    </div>
    <app-player-list
      [players]="game.players"
      [currentPlayerId]="game.currentPlayerId"
      [myPlayerId]="myPlayerId"
      [streams]="remoteStreams">
    </app-player-list>
  </aside>

  <!-- CENTER: Tur-info + Terninger + Handlinger -->
  <main class="col-center">

    <!-- Turn banner -->
    <app-turn-banner
      [currentPlayerName]="currentPlayerName"
      [isMyTurn]="isMyTurn"
      [roundNumber]="game.roundNumber"
      [rollNumber]="game.rollNumber"
      [maxRolls]="3">
    </app-turn-banner>

    <!-- Dice card -->
    <div class="dice-card">

      <div class="dice-status">
        <span *ngIf="isMyTurn && game.rollNumber === 0" class="status-pill first">
          🎲 Klik for at kaste
        </span>
        <span *ngIf="isMyTurn && game.rollNumber > 0 && game.rollNumber < 3" class="status-pill hold">
          👆 Klik på en terning for at holde den
        </span>
        <span *ngIf="canSelectOnly" class="status-pill select">
          ✅ Vælg en kategori i scorekortet →
        </span>
        <span *ngIf="!isMyTurn" class="status-pill waiting">
          ⏳ Venter på {{ currentPlayerName }}…
        </span>
      </div>

      <app-dice-tray
        [dice]="game.dice"
        [canInteract]="isMyTurn && game.rollNumber > 0"
        (toggleHold)="onToggleHold($event)">
      </app-dice-tray>

      <div class="action-row">
        <button class="btn-roll"
                (click)="rollDice()"
                [class.pulse]="isMyTurn && game.rollNumber === 0"
                [class.reroll]="isMyTurn && game.rollNumber > 0 && game.rollNumber < 3"
                [disabled]="!canRoll || isActing">
          <span class="roll-icon">🎲</span>
          <span>{{ game.rollNumber === 0 ? 'Kast terninger' : 'Kast igen' }}</span>
          <span class="roll-counter" *ngIf="game.rollNumber > 0">
            {{ game.rollNumber }}/3
          </span>
        </button>
      </div>

    </div>

    <p class="error-msg" *ngIf="errorMessage">⚠️ {{ errorMessage }}</p>
  </main>

  <!-- RIGHT: Scorekort -->
  <aside class="col-score">
    <div class="score-header">
      <h3 class="score-title">📊 Scorekort</h3>
      <span class="round-chip">Runde {{ game.roundNumber }}</span>
    </div>
    <app-score-sheet
      [players]="game.players"
      [myPlayerId]="myPlayerId"
      [canSelect]="isMyTurn && game.rollNumber > 0"
      [diceValues]="diceValues"
      (selectCategory)="onSelectCategory($event)">
    </app-score-sheet>
  </aside>

</div>

<ng-template #noGame>
  <div class="splash-loading">
    <div class="spinner"></div>
    <p>Indlæser spil…</p>
  </div>
</ng-template>
