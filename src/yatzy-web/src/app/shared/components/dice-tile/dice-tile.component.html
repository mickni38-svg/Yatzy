<button
  class="dice-tile"
  [class.held]="isHeld"
  [class.disabled]="disabled"
  [class.rolling]="isRolling"
  (click)="onToggle()"
  [disabled]="disabled"
  [attr.aria-label]="'Dice ' + value + (isHeld ? ' – held' : '')">

  <svg class="pip-grid" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <!-- 1 -->
    <circle *ngIf="showPip('c')" cx="30" cy="30" r="6"/>
    <!-- 2 -->
    <circle *ngIf="showPip('tl')" cx="15" cy="15" r="6"/>
    <circle *ngIf="showPip('br')" cx="45" cy="45" r="6"/>
    <!-- 3 uses tl + c + br -->
    <!-- 4 -->
    <circle *ngIf="showPip('tr')" cx="45" cy="15" r="6"/>
    <circle *ngIf="showPip('bl')" cx="15" cy="45" r="6"/>
    <!-- 5 uses all 4 corners + c -->
    <!-- 6 adds ml + mr -->
    <circle *ngIf="showPip('ml')" cx="15" cy="30" r="6"/>
    <circle *ngIf="showPip('mr')" cx="45" cy="30" r="6"/>
  </svg>

  <span class="hold-badge" *ngIf="isHeld">HOLD</span>
</button>
